name: Build NAPI
env:
  DEBUG: napi:*
  APP_NAME: ast-grep-napi
  MACOSX_DEPLOYMENT_TARGET: '10.13'
on:
  workflow_dispatch: null
  push:
    tags:
      - "[0-9]+.*"
  # schedule disabled for fork — enable if needed
  # schedule:
  #   - cron: '0 9 * * *'

defaults:
  run:
    working-directory: ./crates/napi
jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: yarn build --target x86_64-apple-darwin
          - host: windows-latest
            build: yarn build --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
            test: true
          - host: windows-latest
            build: yarn build --target i686-pc-windows-msvc
            target: i686-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: yarn build --target x86_64-unknown-linux-gnu --use-napi-cross
            test: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: yarn build --target x86_64-unknown-linux-musl -x
          - host: macos-latest
            target: aarch64-apple-darwin
            build: yarn build --target aarch64-apple-darwin
          - host: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            build: yarn build --target aarch64-unknown-linux-gnu --use-napi-cross
            test: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: yarn build --target aarch64-unknown-linux-musl -x
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: yarn build --target aarch64-pc-windows-msvc
    name: stable - ${{ matrix.settings.target }} - node@24
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: ./crates/napi/yarn.lock
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-registry
      - name: Cache NPM dependencies
        uses: actions/cache@v5
        with:
          path: .yarn/cache
          key: npm-cache-build-${{ matrix.settings.target }}-node@20
      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        with:
          version: 0.14.1
      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild
      - name: Install dependencies
        run: yarn install
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Test
        if: ${{ matrix.settings.test }}
        run: |
          node_file=$(ls ${APP_NAME}.*.node 2>/dev/null | head -1)
          if [ -n "$node_file" ]; then
            export NAPI_RS_NATIVE_LIBRARY_PATH="$(pwd)/$node_file"
          fi
          yarn test
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crates/napi/${{ env.APP_NAME }}.*.node
          if-no-files-found: error
  publish:
    name: Publish
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    if: "startsWith(github.event.ref, 'refs/tags')"
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true
          cache: yarn
          cache-dependency-path: ./crates/napi/yarn.lock
          registry-url: https://registry.npmjs.org
      - name: Cache NPM dependencies
        uses: actions/cache@v5
        with:
          path: .yarn/cache
          key: npm-cache-ubuntu-22.04-publish
          restore-keys: |
            npm-cache-
      - name: Install dependencies
        run: yarn install
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: crates/napi/artifacts
      - name: Move artifacts
        run: yarn artifacts
      - name: Generate Types
        run: |-
          yarn typegen
      - name: List packages
        run: ls -R ./npm
        shell: bash
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if echo "$TAG_NAME" | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+$"; then
            NPM_TAG="latest"
          elif echo "$TAG_NAME" | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+"; then
            NPM_TAG="next"
          else
            echo "Tag '$TAG_NAME' does not look like a release; skipping publish"
            exit 0
          fi
          echo "Publishing NAPI platform packages with --tag $NPM_TAG..."
          for pkg in npm/*/; do
            echo "Publishing $pkg..."
            cd "$pkg"
            npm publish --access public --tag "$NPM_TAG" --provenance
            cd ../..
          done
          echo "Publishing root @bramburn/ast-grep-dart-napi..."
          npm publish --access public --tag "$NPM_TAG" --provenance
