---
id: swift-member-init
language: Swift
role: member
parentRuleIds: [swift-class, swift-struct, swift-enum, swift-actor]
symbolType: constructor
rule:
  kind: init_declaration
name: init
isPublic:
  has:
    kind: modifiers
    regex: public
---
