id: swift-preconcurrency-import
language: Swift
role: item
symbolType: module
rule:
  pattern: '@preconcurrency import $MODULE'
name: $MODULE
signature: '@preconcurrency import $MODULE'
isImport: true
isExported: false
---
id: swift-import
language: Swift
role: item
symbolType: module
rule:
  pattern: import $MODULE
name: $MODULE
signature: import $MODULE
isImport: true
isExported: false
---
id: swift-class
language: Swift
role: item
symbolType: class
rule:
  all:
    - kind: class_declaration
    - has:
        field: declaration_kind
        pattern: class
    - has:
        kind: type_identifier
        pattern: $NAME
name: $NAME
isExported:
  has:
    kind: modifiers
    regex: 'public|open'
---
id: swift-protocol
language: Swift
role: item
symbolType: interface
rule:
  all:
    - kind: protocol_declaration
    - has:
        kind: type_identifier
        pattern: $NAME
name: $NAME
isExported:
  has:
    kind: modifiers
    regex: public
---
id: swift-struct
