---
id: ruby-singleton-method
language: Ruby
role: member
parentRuleIds: [ruby-class, ruby-module]
symbolType: method
rule:
  kind: singleton_method
  has:
    field: name
    pattern: $NAME
name: $NAME
isPublic: true
---
id: ruby-constant
language: Ruby
role: member
parentRuleIds: [ruby-class, ruby-module]
symbolType: constant
rule:
  kind: assignment
  has:
    field: left
    kind: constant
    pattern: $NAME
name: $NAME
isPublic: true
