id: csharp-using
language: CSharp
role: item
symbolType: module
rule:
  kind: using_directive
  has:
    pattern: $NAME
name: $NAME
isImport: true
isExported: false
---
id: csharp-interface
language: CSharp
role: item
symbolType: interface
rule:
  kind: interface_declaration
  has:
    field: name
    pattern: $NAME
name: $NAME
isExported:
  has:
    kind: modifier
    regex: '^public$'
