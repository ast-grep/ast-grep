---
id: csharp-member-property
language: CSharp
role: member
parentRuleIds: [csharp-class, csharp-record, csharp-struct, csharp-interface]
symbolType: property
rule:
  kind: property_declaration
  has:
    field: name
    pattern: $NAME
name: $NAME
isPublic:
  any:
    - has:
        kind: modifier
        regex: '^public$'
    - inside:
        kind: interface_declaration
        stopBy: end
---
id: csharp-member-field
language: CSharp
role: member
parentRuleIds: [csharp-class, csharp-record, csharp-struct]
symbolType: field
rule:
  kind: field_declaration
  has:
    kind: variable_declarator
    stopBy: end
    has:
      field: name
      pattern: $NAME
name: $NAME
isPublic:
  has:
    kind: modifier
    regex: '^public$'
---
id: csharp-enum-member
language: CSharp
role: member
