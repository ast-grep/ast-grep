---
id: java-member-method
language: Java
role: member
parentRuleIds: [java-interface, java-enum, java-class]
symbolType: method
rule:
  all:
    - kind: method_declaration
    - has:
        field: name
        pattern: $NAME
name: $NAME
isPublic:
  has:
    kind: modifiers
    has:
      pattern: public
---
id: java-member-constructor
language: Java
role: member
parentRuleIds: [java-enum, java-class]
symbolType: constructor
rule:
  all:
    - kind: constructor_declaration
    - has:
        field: name
        pattern: $NAME
name: $NAME
isPublic:
  has:
    kind: modifiers
    has:
      pattern: public
---
id: java-member-field
language: Java
role: member
parentRuleIds: [java-interface, java-enum, java-class]
symbolType: field
rule:
  all:
    - kind: field_declaration
    - has:
        field: declarator
        has:
          field: name
          pattern: $NAME
    - not:
        has:
          kind: modifiers
          has:
            any:
              - pattern: private
              - pattern: protected
name: $NAME
isPublic:
  has:
    kind: modifiers
    has:
      pattern: public
