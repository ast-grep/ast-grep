id: java-static-import
language: Java
role: item
symbolType: module
rule:
  pattern: import static $PATH;
name: $PATH
signature: import static $PATH
isImport: true
isExported: false
---
id: java-import
language: Java
role: item
symbolType: module
rule:
  pattern: import $PATH;
name: $PATH
signature: import $PATH
isImport: true
isExported: false
---
id: java-interface
language: Java
role: item
symbolType: interface
rule:
  all:
    - kind: interface_declaration
    - has:
        field: name
        pattern: $NAME
name: $NAME
isExported:
  has:
    kind: modifiers
    has:
      pattern: public
---
id: java-enum
language: Java
role: item
