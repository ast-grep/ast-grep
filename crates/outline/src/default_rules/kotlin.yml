id: kotlin-import-alias
language: Kotlin
role: item
symbolType: module
rule:
  pattern: import $PATH as $ALIAS
name: $ALIAS
signature: import $PATH as $ALIAS
isImport: true
isExported: false
---
id: kotlin-import
language: Kotlin
role: item
symbolType: module
rule:
  pattern: import $PATH
name: $PATH
signature: import $PATH
isImport: true
isExported: false
---
id: kotlin-enum
language: Kotlin
role: item
symbolType: enum
rule:
  all:
    - kind: class_declaration
    - has:
        kind: enum_class_body
    - has:
        kind: type_identifier
        pattern: $NAME
name: $NAME
isExported:
  not:
    has:
      kind: modifiers
      regex: 'private|internal|protected'
---
id: kotlin-interface
