id: kotlin-member-nested-enum
language: Kotlin
role: member
parentRuleIds: [kotlin-enum, kotlin-interface, kotlin-object, kotlin-class]
symbolType: enum
rule:
  all:
    - kind: class_declaration
    - has:
        kind: enum_class_body
    - has:
        kind: type_identifier
        pattern: $NAME
    - inside:
        kind: class_body
name: $NAME
isPublic:
  not:
    has:
      kind: modifiers
      regex: 'private|internal|protected'
