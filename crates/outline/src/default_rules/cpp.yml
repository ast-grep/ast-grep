id: cpp-nested-struct
language: Cpp
role: member
parentRuleIds: [cpp-class, cpp-struct]
symbolType: struct
rule:
  kind: struct_specifier
  has:
    field: name
    pattern: $NAME
name: $NAME
isPublic: false
---
id: cpp-enum-member
language: Cpp
role: member
parentRuleIds: [cpp-enum]
symbolType: enumMember
rule:
  kind: enumerator
  has:
    field: name
    pattern: $NAME
name: $NAME
