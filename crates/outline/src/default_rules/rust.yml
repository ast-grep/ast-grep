---
id: rust-mod-member-function
language: Rust
role: member
parentRuleIds: [rust-mod]
symbolType: function
rule:
  all:
    - kind: function_item
    - pattern: $DECL
    - has:
        field: name
        pattern: $NAME
    - not:
        inside:
          kind: impl_item
          stopBy: end
    - not:
        inside:
          kind: trait_item
          stopBy: end
    - not:
        inside:
          kind: block
          stopBy: end
transform:
  BODYLESS:
    replace:
      source: $DECL
      replace: '\s*\{[\s\S]*$'
      by: ''
  SIG:
    replace:
      source: $BODYLESS
      replace: '\n[\s\S]*$'
      by: ''
name: '$NAME'
signature: '$SIG'
isPublic:
  has:
    kind: visibility_modifier
    regex: '^pub'
