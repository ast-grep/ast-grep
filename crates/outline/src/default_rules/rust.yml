id: rust-use-public
language: Rust
role: item
symbolType: module
rule:
  pattern: 'pub use $PATH;'
name: '$PATH'
isImport: true
isExported: true
---
id: rust-use
language: Rust
role: item
symbolType: module
rule:
  pattern: 'use $PATH;'
name: '$PATH'
isImport: true
isExported: false
---
id: rust-mod
language: Rust
role: item
symbolType: module
rule:
  all:
    - kind: mod_item
    - pattern: $DECL
    - has:
        field: name
        pattern: $NAME
transform:
  BODYLESS:
    replace:
      source: $DECL
      replace: '\s*\{[\s\S]*$|;\s*$'
      by: ''
  SIG:
    replace:
      source: $BODYLESS
      replace: '\n[\s\S]*$'
      by: ''
name: '$NAME'
signature: '$SIG'
isExported:
  has:
    kind: visibility_modifier
    regex: '^pub'
